<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <link
    rel="stylesheet"
    href="style.css"
  >

  <title>
    原神ランダム編成
  </title>

</head>

<body>

  <h1 class="main-title">
  原神ランダム編成
</h1>



  <div class="tab-buttons">

    <button
      class="tab-button active"
      onclick="showTab('generator')"
      id="generator-button"
    >

      編成する

    </button>

    <button
      class="tab-button"
      onclick="showTab('history')"
      id="history-button"
    >

      挑戦履歴

      <span id="history-count">
        (0)
      </span>

    </button>

  </div>



  <div id="generator-tab">
    
    <div id="result"></div>

 <div id="message-area"></div>

    <div class="button-area">

      <button id="random-button">

        ランダム編成！

      </button>

      <button id="save-button">

        次の組へ

      </button>

    </div>

    <div id="reset-area">

  <a
    href="#"
    id="reset-link"
  >
    抽選履歴をリセット
  </a>

</div>



    <h2>編成待ちキャラ</h2>
    <div id="remaining-info"></div>

    <div id="character-list"></div>

  </div>



  <div
    id="history-tab"
    style="display: none;"
  >

    <div
  id="share-card"
  style="display:none;"
></div>

    <h2>挑戦履歴</h2>
    
    <div id="total-stars">

  合計 ★0

</div>

    <button id="preview-share-button">
  シェアカード確認
</button>

<button
  id="share-button"
  onclick="shareResult()"
>
  共有
</button>

    

    <div id="history-list">

      <p>
        まだ履歴がありません
      </p>

    </div>

  </div>



  <script src="characters.js"></script>

  <script src="script.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</body>

</html>
